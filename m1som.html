<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fantasy Tamagotchi - Modern UI</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f6; font-family: 'Sarabun', sans-serif; overflow: hidden; }

        /* --- หน้าจอเลือกสัตว์เลี้ยง --- */
        #selection-screen { background-color: #ffffff; width: 95%; max-width: 600px; max-height: 90vh; border-radius: 30px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: center; overflow-y: auto; }
        .pet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 20px; }
        .pet-card { background-color: #f8f9fa; border: 2px solid #e9ecef; border-radius: 20px; padding: 15px 5px; cursor: pointer; transition: transform 0.2s, border-color 0.2s; touch-action: manipulation; }
        @media (hover: hover) { .pet-card:hover { transform: scale(1.05); border-color: #4cb0a9; } }
        .pet-card-emoji { font-size: 35px; margin-bottom: 8px; }
        .pet-card-name { font-size: 13px; font-weight: bold; color: #2c3e50; }

        /* --- หน้าจอเล่นเกม (Modern UI) --- */
        #game-boy { display: none; background-color: #ffffff; width: 95%; max-width: 400px; border-radius: 40px; padding: 30px 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); text-align: center; position: relative; }
        
        #pet-title { font-size: 22px; font-weight: 800; color: #2d3436; margin: 0 0 8px 0; }
        .info-text { color: #87929d; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        #time-text { color: #3498db; margin-bottom: 20px; }

        /* พื้นที่สัตว์เลี้ยง */
        #screen { background-color: #eaf5f7; border-radius: 25px; padding: 20px 25px 25px 25px; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        /* ป้ายสถานะแบบแคปซูล */
        #status-pill-container { display: flex; justify-content: center; width: 100%; margin-bottom: 15px; position: relative; }
        #status-text { background-color: #ffffff; color: #4a5568; font-size: 13px; font-weight: bold; padding: 6px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: inline-block; z-index: 2; transition: all 0.2s; }
        
        #warning-box { position: absolute; top: -10px; right: -10px; background-color: #ff6b6b; color: white; padding: 5px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4); display: none; z-index: 5; animation: pulse-warn 1s infinite alternate; }
        @keyframes pulse-warn { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        #pet-container { height: 110px; display: flex; justify-content: center; align-items: center; font-size: 80px; animation: bounce 2s infinite; transition: all 1s ease-in-out; margin-bottom: 10px; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes ascend-glow { 0% { transform: scale(1); filter: drop-shadow(0 0 10px #f1c40f); } 50% { transform: scale(1.3) translateY(-10px); filter: drop-shadow(0 0 40px #f1c40f); } 100% { transform: scale(1.2); filter: drop-shadow(0 0 20px #f1c40f); } }
        @keyframes pooping-shake { 0%, 100% { transform: translateX(0) scale(1); } 25%, 75% { transform: translateX(-5px) scale(1.05); } 50% { transform: translateX(5px) scale(1.05); } }

        /* แถบสถานะแบบใหม่ */
        .stats-wrapper { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .stat-row { display: flex; align-items: center; width: 100%; }
        .stat-label { font-size: 13px; font-weight: bold; color: #4a5568; width: 65px; text-align: left; }
        .bar-bg { flex-grow: 1; background-color: #f0f4f8; border-radius: 10px; height: 12px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 0.3s ease, background-color 0.3s ease; }
        
        #exp-bar { background-color: #2ecc71; }
        #hunger-bar { background-color: #ff6b6b; }
        #happy-bar { background-color: #feca57; }
        #energy-bar { background-color: #48dbfb; }

        /* ปุ่มกดดีไซน์ใหม่ */
        .controls-wrapper { margin-top: 25px; }
        .controls-row-1 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
        .controls-row-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15%; }
        
        button.action-btn { color: white; border: none; border-radius: 16px; padding: 12px 5px; font-size: 13px; font-weight: bold; cursor: pointer; touch-action: manipulation; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: transform 0.1s, opacity 0.2s; box-shadow: none; line-height: 1.2; }
        button.action-btn:active:not(:disabled) { transform: scale(0.95); }
        button.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-icon { font-size: 22px; }

        .btn-teal { background-color: #4cb0a9; }
        .btn-orange { background-color: #eb903f; }
        .btn-purple { background-color: #996df0; }
        .btn-gray { background-color: #9ea6b5; }
        .btn-blue { background-color: #3d8eee; }

        #btn-restart { display: none; background-color: #ff6b6b; color: white; border: none; border-radius: 16px; padding: 15px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; touch-action: manipulation; transition: transform 0.1s; }
        #btn-restart:active { transform: scale(0.95); }

        /* --- หน้าต่างควิซ & กล่องสุ่ม (Modal) --- */
        #quiz-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255,255,255,0.9); border-radius: 40px; z-index: 20; justify-content: center; align-items: center; flex-direction: column; padding: 20px; backdrop-filter: blur(5px); }
        #quiz-box { background-color: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid #f1f2f6; }
        #quiz-content { display: block; } 
        #box-content { display: none; } 
        
        #quiz-question { font-size: 16px; font-weight: bold; margin-bottom: 20px; color: #2d3436; }
        .quiz-choice { display: block; width: 100%; margin: 10px 0; padding: 14px; background-color: #f8f9fa; color: #2d3436; border: 2px solid #e9ecef; border-radius: 15px; font-size: 14px; cursor: pointer; font-weight: bold; touch-action: manipulation; transition: all 0.2s; }
        .quiz-choice:active { transform: scale(0.98); background-color: #e9ecef; }

        .box-container { display: flex; justify-content: space-around; margin-top: 20px; }
        .mystery-box { font-size: 40px; cursor: pointer; background: #feca57; border-radius: 18px; padding: 15px; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(254, 202, 87, 0.4); touch-action: manipulation; transition: transform 0.1s; }
        .mystery-box.bad { background: #ff6b6b; box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4); }
        .mystery-box:active { transform: scale(0.9); box-shadow: none; }
        
        #box-message { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #2d3436; }
        #close-quiz { margin-top: 20px; background: #f1f2f6; color: #4a5568; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s;}
        #close-quiz:active { background: #e2e8f0; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h1 style="color: #2d3436; margin-top: 0; font-size: 24px; font-weight: 800;">เลือกสัตว์เลี้ยงของคุณ</h1>
        <p style="color: #87929d; font-size: 14px;">สอบซ่อมคณิตศาสตร์เพิ่มเติม ม.1<br>ตอบควิซลุ้นสุ่มกล่อง EXP เพื่อพัฒนาร่าง</p>
        <div class="pet-grid" id="pet-grid"></div>
    </div>

    <div id="game-boy">

    <script>
        // ==========================================
        const SUBJECT_NAME = "Math_M1_Add1"; 
        const SAVE_KEY = "tamagotchiSave_" + SUBJECT_NAME; 

        // --- ระบบเสียง ---
        let audioCtx;
        function initAudio() {
            try {
                if (!audioCtx) { 
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if(AudioContext) audioCtx = new AudioContext(); 
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) { console.log("Audio not supported"); }
        }

        function playSound(type) {
            try {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'click') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); 
                    osc.start(now); osc.stop(now + 0.1);
                } 
                else if (type === 'correct') { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(600, now); osc.frequency.linearRampToValueAtTime(900, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); 
                    osc.start(now); osc.stop(now + 0.3);
                } 
                else if (type === 'wrong') { 
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, now); osc.frequency.linearRampToValueAtTime(150, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); 
                    osc.start(now); osc.stop(now + 0.3);
                }
                else if (type === 'levelup') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.1); osc.frequency.setValueAtTime(800, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.4); 
                    osc.start(now); osc.stop(now + 0.4);
                }
                else if (type === 'victory') { 
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(261.63, now); osc.frequency.setValueAtTime(329.63, now + 0.15); 
                    osc.frequency.setValueAtTime(392.00, now + 0.3); osc.frequency.setValueAtTime(523.25, now + 0.45); 
                    gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
                    gain.gain.setValueAtTime(0.2, now + 0.45); gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                    osc.start(now); osc.stop(now + 1.5);
                }
            } catch (e) { console.log("Play sound error"); }
        }

        // --- รางวัลและบทลงโทษ ---
        const rewards = [

            { text: "สะดุดล้ม! (พลังงาน -50) 💤", effect: () => { stats.energy = Math.max(0, stats.energy - 50); playSound('wrong'); } },

            { text: "โดนขโมยความรู้! (EXP -15) 📉", effect: () => { stats.exp = Math.max(0, stats.exp - 15); playSound('wrong'); } }
        ];

        let selectedStages = [];
        let gameInterval = null;
        let timerInterval = null;
        let currentQuestion = null;
        let generatedBoxes = []; 
        let currentPetIndex = 0; 

        const MAX_LEVEL = 20;
        let stats = { hunger: 100, happy: 100, energy: 100, level: 1, exp: 0, poopTimer: 0, playSeconds: 0 };
        let isAlive = true;
        let isSleeping = false;
        let isGameWon = false; 
        let needsPoop = false; 
        let isPooping = false; 

        const petElement = document.getElementById('pet-container');
        const statusText = document.getElementById('status-text');
        const warningBox = document.getElementById('warning-box');
        const levelText = document.getElementById('level-text');
        const timeText = document.getElementById('time-text');
        const petTitle = document.getElementById('pet-title');

        // --- ฟังก์ชันป้องกันแอปแครชจากเซฟเก่า ---
        function safeRestart() {
            // 1. ถามยืนยันก่อน
            const confirmDelete = confirm("คุณแน่ใจใช่ไหมที่จะเริ่มใหม่?\nข้อมูลการเล่นทั้งหมดจะถูกลบและกู้คืนไม่ได้!");
            
            if (confirmDelete) {
                try {
                    // 2. ลบข้อมูลเซฟ
                    localStorage.removeItem(SAVE_KEY);
                    
                    // 3. รีเซ็ตสถานะในตัวเกมให้เป็นค่าเริ่มต้น
                    isAlive = true;
                    isGameWon = false;
                    stats = { hunger: 100, happy: 100, energy: 100, level: 1, exp: 0, poopTimer: 0, playSeconds: 0 };
                    
                    // 4. ซ่อนหน้าจอเกมและโชว์หน้าเลือกสัตว์แทน (ไม่ต้องรีโหลดหน้าเว็บ)
                    document.getElementById('game-boy').style.display = 'none';
                    document.getElementById('selection-screen').style.display = 'block';
                    document.getElementById('controls').style.display = 'grid'; // คืนค่าปุ่มกด
                    document.getElementById('btn-restart').style.display = 'none';
                    
                    // 5. หยุดการทำงานของ Loop เดิม
                    clearInterval(gameInterval);
                    clearInterval(timerInterval);
                    
                    // 6. ล้างหน้าจอสัตว์เลี้ยง
                    petElement.style.animation = 'bounce 2s infinite';
                    statusText.innerText = "พร้อมเรียนรู้!";
                    statusText.style.color = "white";
                    
                } catch(e) {
                    location.reload();
                }
            }
        }

        // --- ระบบบันทึกเกมและโหลดเกม ---
        function saveGame() {
            try {
                const gameData = {
                    stats: stats,
                    isAlive: isAlive,
                    isSleeping: isSleeping,
                    isGameWon: isGameWon,
                    currentPetIndex: currentPetIndex,
                    needsPoop: needsPoop
                };
                localStorage.setItem(SAVE_KEY, JSON.stringify(gameData));
            } catch(e) { console.log("Save error"); }
        }

        function loadGame() {
            try {
                const savedData = localStorage.getItem(SAVE_KEY);
                if (savedData) {
                    const gameData = JSON.parse(savedData);
                    
                    stats = gameData.stats || {};
                    if(isNaN(stats.hunger)) stats.hunger = 100;
                    if(isNaN(stats.happy)) stats.happy = 100;
                    if(isNaN(stats.energy)) stats.energy = 100;
                    if(isNaN(stats.level)) stats.level = 1;
                    if(isNaN(stats.exp)) stats.exp = 0;
                    if(isNaN(stats.poopTimer)) stats.poopTimer = 0; 
                    if(isNaN(stats.playSeconds)) stats.playSeconds = 0; 
                    
                    isAlive = gameData.isAlive !== false; 
                    isSleeping = gameData.isSleeping === true;
                    isGameWon = gameData.isGameWon === true;
                    needsPoop = gameData.needsPoop === true;
                    
                    currentPetIndex = gameData.currentPetIndex || 0;
                    if(!petDatabase[currentPetIndex]) currentPetIndex = 0;
                    
                    selectedStages = petDatabase[currentPetIndex].stages;
                    petTitle.innerText = petDatabase[currentPetIndex].name;
                    
                    document.getElementById('selection-screen').style.display = 'none';
                    document.getElementById('game-boy').style.display = 'block';
                    
                    if (isGameWon) {
                        triggerEnding(true);
                    } else if (!isAlive) {
                        updateUI();
                    } else {
                        if (isSleeping) petElement.style.animation = 'bounce 4s infinite';
                        updateUI();
                        gameInterval = setInterval(gameLoop, 2000);
                        startPlayTimer();
                    }
                    return true; 
                }
            } catch(e) {
                console.log("Load error, starting fresh");
                safeRestart();
            }
            return false; 
        }

        // --- ระบบนับเวลาเล่น ---
        function startPlayTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isAlive && !isGameWon) {
                    stats.playSeconds++;
                    updateTimeDisplay();
                    saveGame();
                }
            }, 1000);
        }

        function updateTimeDisplay() {
            const m = Math.floor(stats.playSeconds / 60);
            const s = stats.playSeconds % 60;
            timeText.innerText = `⏱️ เวลาเล่น: ${m} นาที ${s} วินาที`;
        }

        function getMaxExpForLevel(level) {
            return 100 + ((level - 1) * 20);
        }

        function renderSelection() {
            const grid = document.getElementById('pet-grid');
            petDatabase.forEach((pet, index) => {
                const finalForm = pet.stages[4].emoji; 
                const card = document.createElement('div');
                card.className = 'pet-card';
                card.onclick = () => { initAudio(); playSound('click'); startGame(index); };
                card.innerHTML = `<div class="pet-card-emoji">${finalForm}</div><div class="pet-card-name">${pet.name}</div>`;
                grid.appendChild(card);
            });
        }

        function startGame(petIndex) {
            currentPetIndex = petIndex;
            selectedStages = petDatabase[petIndex].stages;
            petTitle.innerText = petDatabase[petIndex].name;
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-boy').style.display = 'block';
            
            saveGame(); 
            updateUI();
            updateTimeDisplay();
            gameInterval = setInterval(gameLoop, 2000); 
            startPlayTimer();
        }

        function getStage() {
            if(!selectedStages || selectedStages.length === 0) return { emoji: '🥚', name: 'ไข่' };
            let current = selectedStages[0];
            for(let i=0; i < selectedStages.length; i++) {
                if(stats.level >= selectedStages[i].reqLevel) current = selectedStages[i];
            } return current;
        }

        function checkLevelUp() {
            let currentMaxExp = getMaxExpForLevel(stats.level);
            
            if(stats.exp >= currentMaxExp && stats.level < MAX_LEVEL) {
                stats.exp -= currentMaxExp; 
                stats.level++; 
                
                if (stats.level >= MAX_LEVEL) { 
                    triggerEnding(false); 
                } else {
                    playSound('levelup');
                    statusText.innerText = `เลเวลอัป! เป็นเลเวล ${stats.level}`;
                    statusText.style.color = "#4cb0a9";
                    setTimeout(() => { statusText.style.color = "#4a5568"; }, 2000);
                    checkLevelUp(); 
                }
            }
        }

        function triggerEnding(isLoad) {
            isGameWon = true; 
            clearInterval(gameInterval); 
            clearInterval(timerInterval);
            if (!isLoad) playSound('victory');
            
            const finalStage = getStage(); 
            petElement.innerText = finalStage.emoji;
            petElement.style.animation = "ascend-glow 2s infinite alternate";

            statusText.innerHTML = `🎉 ยินดีด้วย! จุติเป็น ${finalStage.name}! 🌟`;
            statusText.style.color = "#f1c40f";
            levelText.innerText = `Level: MAX (ร่างจุติ)`;
            updateTimeDisplay();
            warningBox.style.display = 'none';
            
            document.getElementById('controls').style.display = 'none';
            const btnRestart = document.getElementById('btn-restart');
            btnRestart.style.display = 'block';
            btnRestart.innerHTML = '✨ เลี้ยงตัวใหม่ ✨';

            document.getElementById('exp-bar').style.width = '100%';
            document.getElementById('exp-bar').style.backgroundColor = '#2ecc71'; 
            saveGame();
        }

        function updateWarnings() {
            if (!isAlive || isGameWon || isSleeping) { warningBox.style.display = 'none'; return; }
            let warnings = [];
            if (needsPoop) warnings.push("ปวดอึแล้ว! 💩");
            if (stats.hunger < 30) warnings.push("หิวข้าวแล้ว! 🍖");
            if (stats.happy < 30) warnings.push("เครียดจังเลย! 🎾");
            if (stats.energy < 20) warnings.push("ง่วงนอนจัง... 💤");

            if (warnings.length > 0) {
                warningBox.innerHTML = warnings.join("<br>");
                warningBox.style.display = 'block';
            } else { warningBox.style.display = 'none'; }
        }

        function updateUI() {
            try {
                if (!isAlive || isGameWon) return; 
                
                let currentMaxExp = getMaxExpForLevel(stats.level);
                let expPercent = (stats.exp / currentMaxExp) * 100;
                
                document.getElementById('hunger-bar').style.width = stats.hunger + '%';
                document.getElementById('happy-bar').style.width = stats.happy + '%';
                document.getElementById('energy-bar').style.width = stats.energy + '%';
                document.getElementById('exp-bar').style.width = expPercent + '%';

                document.getElementById('happy-bar').style.backgroundColor = stats.happy < 30 ? '#ff6b6b' : '#feca57';
                document.getElementById('hunger-bar').style.backgroundColor = stats.hunger < 30 ? '#c0392b' : '#ff6b6b';
                document.getElementById('energy-bar').style.backgroundColor = stats.energy < 20 ? '#996df0' : '#48dbfb';

                const currentStage = getStage();
                if(!isPooping) {
                    petElement.innerText = isSleeping ? '😴' : currentStage.emoji;
                }
                
                levelText.innerText = `Level: ${stats.level} | EXP: ${Math.floor(stats.exp)}/${currentMaxExp} (ร่าง: ${currentStage.name})`;
                updateWarnings(); 
                
                const btns = ['btn-quiz', 'btn-feed', 'btn-play', 'btn-sleep', 'btn-poop'];
                if (isPooping) {
                    btns.forEach(id => document.getElementById(id).disabled = true);
                } else {
                    btns.forEach(id => document.getElementById(id).disabled = false);
                }

                if (stats.hunger <= 0) {
                    isAlive = false; petElement.innerText = '👻'; petElement.style.animation = 'none';
                    statusText.innerText = 'ลาก่อน... หิวตายแล้ว 😭'; statusText.style.color = "#ff6b6b";
                    warningBox.style.display = 'none'; playSound('wrong'); 
                    clearInterval(gameInterval); clearInterval(timerInterval);
                    
                    document.getElementById('controls').style.display = 'none';
                    const btnRestart = document.getElementById('btn-restart');
                    btnRestart.style.display = 'block';
                    btnRestart.innerHTML = '🔄 เริ่มเกมใหม่';
                }
                saveGame(); 
            } catch(e) { console.log("UI Update Error"); }
        }

        // --- ระบบควิซและกล่อง ---
        function openQuiz() {
            try { initAudio(); playSound('click'); } catch(e){}
            if (!isAlive || isSleeping || isGameWon || isPooping) return;
            
            if (needsPoop) { statusText.innerText = 'ปวดอึ! พาไปขับถ่ายก่อนนะ 💩'; updateWarnings(); return; }
            if (stats.happy < 30) { statusText.innerText = 'เครียดเกินไป! พาไปเล่นก่อนนะ'; return; }
            if (stats.energy < 20) { statusText.innerText = 'พลังงานไม่พอ! ให้นอนก่อนนะ'; return; }
            
            document.getElementById('quiz-content').style.display = 'block';
            document.getElementById('box-content').style.display = 'none';

            const randomIndex = Math.floor(Math.random() * questions.length);
            currentQuestion = questions[randomIndex];
            document.getElementById('quiz-question').innerText = currentQuestion.q;
            
            const choicesDiv = document.getElementById('quiz-choices');
            choicesDiv.innerHTML = '';
            currentQuestion.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-choice'; btn.innerText = choice;
                btn.onclick = () => answerQuiz(index);
                choicesDiv.appendChild(btn);
            });
            document.getElementById('quiz-modal').style.display = 'flex';
        }

        function closeQuiz() { document.getElementById('quiz-modal').style.display = 'none'; }

        function answerQuiz(selectedIndex) {
            stats.energy = Math.max(0, stats.energy - 15); 
            stats.happy = Math.max(0, stats.happy - 10); 
            stats.hunger = Math.max(0, stats.hunger - 5); 
            
            const isCorrect = (selectedIndex === currentQuestion.answer);
            if (isCorrect) playSound('correct');
            else playSound('wrong');

            showBoxes(isCorrect);
        }

        function showBoxes(isCorrect) {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('box-content').style.display = 'block';
            
            const boxMessage = document.getElementById('box-message');
            const boxContainer = document.getElementById('box-container');
            boxContainer.innerHTML = ''; 
            generatedBoxes = [];

            let sourceList = isCorrect ? [...rewards] : [...punishments];
            boxMessage.innerText = isCorrect ? "ถูกต้อง! 🎉 เลือกกล่องรับรางวัล" : "ตอบผิด! 😱 เลือกกล่องรับบทลงโทษ";
            boxMessage.style.color = isCorrect ? "#4cb0a9" : "#ff6b6b";

            for(let i=0; i<3; i++) {
                let randIdx = Math.floor(Math.random() * sourceList.length);
                generatedBoxes.push(sourceList[randIdx]);
                sourceList.splice(randIdx, 1); 
                
                const boxBtn = document.createElement('div');
                boxBtn.className = isCorrect ? 'mystery-box' : 'mystery-box bad';
                boxBtn.innerText = '🎁';
                boxBtn.onclick = () => { playSound('click'); openBox(i); };
                boxContainer.appendChild(boxBtn);
            }
        }

        function openBox(boxIndex) {
            const selectedItem = generatedBoxes[boxIndex];
            selectedItem.effect(); 
            statusText.innerText = selectedItem.text;
            checkLevelUp();
            updateUI();
            closeQuiz();
        }

        // --- ปุ่มแอคชั่นต่างๆ ---
        function poop() {
            try { initAudio(); playSound('click'); } catch(e){}
            if (!isAlive || isGameWon || isSleeping || isPooping) return;
            
            if (!needsPoop) {
                statusText.innerText = 'ยังไม่ปวดอึเลย...';
                return;
            }
            
            isPooping = true;
            statusText.innerText = 'กำลังเบ่งอึ... 💩💦';
            petElement.style.animation = 'pooping-shake 0.5s infinite'; 
            updateUI(); 

            let poopDuration = Math.floor(Math.random() * 5000) + 3000;

            setTimeout(() => {
                if(!isAlive) return;
                isPooping = false;
                needsPoop = false;
                stats.poopTimer = 0; 
                
                stats.happy = Math.min(100, stats.happy + 15); 
                stats.hunger = Math.max(0, stats.hunger - 5); 
                
                statusText.innerText = 'โล่งท้องแล้ว! ✨';
                playSound('correct');
                petElement.style.animation = 'bounce 2s infinite'; 
                updateUI();
            }, poopDuration);
        }

        function feed() {
            try { initAudio(); playSound('click'); } catch(e){}
            if (!isAlive || isSleeping || isGameWon || isPooping) return;
            stats.hunger = Math.min(100, stats.hunger + 30);
            
            stats.poopTimer += 15;
            if (stats.poopTimer >= 100 && !needsPoop) needsPoop = true;

            statusText.innerText = 'หงับๆ อร่อยจัง!'; updateUI();
        }

        function play() {
            try { initAudio(); playSound('click'); } catch(e){}
            if (!isAlive || isSleeping || isGameWon || isPooping) return;
            if (stats.energy < 15) { statusText.innerText = 'เหนื่อยเกินไป ขอพักหน่อย...'; return; }
            stats.happy = Math.min(100, stats.happy + 30);
            stats.energy = Math.max(0, stats.energy - 10);
            stats.hunger = Math.max(0, stats.hunger - 10);
            statusText.innerText = 'เย้! สนุกจังเลย'; updateUI();
        }

        function sleep() {
            try { initAudio(); playSound('click'); } catch(e){}
            if (!isAlive || isGameWon || isPooping) return;
            
            isSleeping = !isSleeping;
            if (!isSleeping) {
                statusText.innerText = 'ตื่นแล้ว!';
            } else {
                statusText.innerText = 'กำลังนอนหลับ...';
            }
            
            petElement.style.animation = isSleeping ? 'bounce 4s infinite' : 'bounce 2s infinite';
            updateUI();
        }

        function gameLoop() {
            try {
                if (!isAlive || isGameWon) return;
                
                if (isSleeping) {
                    stats.energy = Math.min(100, stats.energy + 10);
                    stats.hunger = Math.max(0, stats.hunger - 1);
                    
                    if (stats.energy >= 100) {
                        isSleeping = false;
                        statusText.innerText = 'ตื่นแล้ว! พลังงานเต็มเปี่ยม ✨';
                        petElement.style.animation = 'bounce 2s infinite';
                        updateWarnings();
                    }
                } else {
                    stats.hunger = Math.max(0, stats.hunger - 1.5);
                    stats.happy = Math.max(0, stats.happy - 1); 
                    
                    if (!needsPoop) {
                        stats.poopTimer += 2;
                        if (stats.poopTimer >= 100) needsPoop = true;
                    }
                }
                updateUI();
            } catch (e) { console.log("Game loop error"); }
        }

        window.onload = () => {
            if (!loadGame()) {
                renderSelection();
            }
        };
    </script>
</body>
</html>
